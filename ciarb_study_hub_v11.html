<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIArb Study Hub — Module 1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Naskh Arabic','Tajawal',sans-serif;direction:rtl;text-align:right;background:#1a1a2e;overflow:hidden}
.shell{display:flex;height:100vh;width:100vw}
/* ── SIDEBAR ── */
.sidebar{width:258px;background:#16213e;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .3s ease}
.sidebar.collapsed{width:58px}
.sidebar-top{padding:14px 12px 10px;border-bottom:1px solid #0f3460;flex-shrink:0}
.app-logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#F37021,#e65100);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text-wrap .logo-text{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;font-family:'Amiri',serif}
.logo-text-wrap .logo-sub{font-size:11px;color:#7f8cb6;white-space:nowrap}
.module-pill{background:#0f3460;border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .2s}
.module-pill:hover{background:#1a4a8a}
.m-icon{font-size:15px;flex-shrink:0}
.m-text{font-size:12px;color:#a0b4e0;white-space:nowrap;overflow:hidden;flex:1}
.m-badge{background:#F37021;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0}
.sidebar-nav::-webkit-scrollbar{width:3px}
.sidebar-nav::-webkit-scrollbar-thumb{background:#0f3460;border-radius:4px}
.nav-section-title{font-size:10px;color:#4a5a80;text-transform:uppercase;letter-spacing:1px;padding:8px 14px 4px;white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;transition:background .15s;border-right:3px solid transparent}
.nav-item:hover{background:#0f3460}
.nav-item.active{background:#0f3460;border-right-color:#F37021}
.ni-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.ni-content{overflow:hidden;min-width:0}
.ni-num{font-size:10px;color:#F37021;font-weight:700;white-space:nowrap}
.ni-title{font-size:12px;color:#c0cce8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item.active .ni-title{color:#fff}
.sidebar-footer{padding:8px 10px;border-top:1px solid #0f3460;flex-shrink:0}
.collapse-btn{width:100%;background:none;border:1px solid #0f3460;color:#7f8cb6;padding:6px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Noto Naskh Arabic',serif;transition:all .2s}
.collapse-btn:hover{background:#0f3460;color:#fff}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f0ede6}
.topbar{background:#fff;padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e0ddd8;flex-shrink:0;gap:10px}
.topbar-left{display:flex;align-items:center;gap:8px;overflow:hidden;min-width:0}
.topbar-breadcrumb{font-size:11px;color:#999;white-space:nowrap;flex-shrink:0}
.topbar-sep{color:#ccc;font-size:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#c62828;font-family:'Amiri',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar-btn{background:#F37021;color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Naskh Arabic',serif;transition:background .2s;white-space:nowrap}
.topbar-btn:hover{background:#e65100}
.topbar-btn.ghost{background:transparent;color:#F37021;border:1px solid #F37021}
.topbar-btn.ghost:hover{background:#fff3e0}
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px}
.content-area::-webkit-scrollbar{width:6px}
.content-area::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px}
/* ── HOME ── */
.home-hero{background:linear-gradient(135deg,#F37021,#e65100);border-radius:10px;padding:28px;margin-bottom:20px;color:#fff;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;left:-30px;top:-30px;width:160px;height:160px;background:rgba(255,255,255,.06);border-radius:50%}
.home-hero h1{font-size:24px;font-weight:700;margin-bottom:5px;font-family:'Amiri',serif}
.home-hero p{font-size:13px;opacity:.9;margin-bottom:16px}
.hero-stats{display:flex;gap:12px;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.15);padding:8px 14px;border-radius:8px;text-align:center}
.hs-num{font-size:20px;font-weight:700}
.hs-label{font-size:10px;opacity:.85}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.module-card{background:#fff;border-radius:10px;padding:18px;border:1.5px solid #e0ddd8;cursor:pointer;transition:all .2s}
.module-card:hover{border-color:#F37021;box-shadow:0 4px 14px rgba(243,112,33,.15);transform:translateY(-2px)}
.module-card.active-card{border-color:#F37021}
.module-card.locked-card{opacity:.6;cursor:default;pointer-events:none}
.mc-icon-home{font-size:26px;margin-bottom:6px}
.mc-title{font-size:15px;font-weight:700;color:#c62828;font-family:'Amiri',serif;margin-bottom:4px}
.mc-desc{font-size:12px;color:#666;margin-bottom:10px}
.mc-footer{display:flex;align-items:center;justify-content:space-between}
.mc-badge{font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600}
.mc-badge.active{background:#fff3e0;color:#F37021}
.mc-badge.soon{background:#e8f5e9;color:#2e7d32}
.mc-progress{font-size:11px;color:#999}
.chapters-quick{background:#fff;border-radius:10px;padding:18px;border:1px solid #e0ddd8}
.cq-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:12px;font-family:'Amiri',serif}
.cq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:7px}

    <!-- IBA Guidelines -->
    <div class="section-title">المبادئ التوجيهية لاتحاد المحامين الدولي (IBA) — القوائم الثلاث</div>

      <p>"تشتمل السلطة المخولة لهيئة التحكيم البتَّ في <span class="kw">مقبولية الأدلة وصلتها بالموضوع وجدواها وأهميتها</span>. ولا يشترط أن تكون الأدلة مقبولةً قانوناً."</p>

    <div class="two-col">
      <div>

          <h4 style="color:#0e6655;">✅ الممارسة المعتمدة</h4>

        </div>
        <div class="col-box" style="margin-top:8px; background:#fdf2f2; border-color:#e74c3c;">

            <li>إذا ثبت أن الطرف "غير قادر على عرض دعواه"</li>
            <li>أصعب بكثير = إثبات أن القبول ثم سوء التقويم</li>
          </ul>
        </div>
      </div>
      <div>

          <p style="font-size:12px; color:#6d4c41; line-height:1.7;">إفادة من شخص ليس شاهداً مباشراً، شفهياً أو كتابياً. مثال: "سمعت رئيس عمال المرآب يقول..."</p>

        <p>العلاقة العامة بين الأدلة والدعوى بحد ذاتها. هل تزيد أو تقلل احتمال حدوث الواقعة؟ في القانون العام: تندمج مع الأهمية. في التحكيم الدولي: تُفصل عنها.</p>
      </div>
      <div class="def-box">

        <p>العلاقة بين الأدلة ونتيجة الدعوى. هل تؤثر في الحكم النهائي؟ في القانون العام تندمج مع الصلة. في التحكيم الدولي: تُعامَل كمعيار مستقل بموجب قواعد IBA.</p>
      </div>
    </div>

    <div class="highlight-box">
      <p>🔑 قواعد IBA لجمع الأدلة: <span class="highlight">الصلة والأهمية هما معياران رئيسيان مستقلان</span> لقبول الأدلة أو المطالبة بتقديمها في التحكيم الدولي.</p>

          <li>القانون المدني: القاضي يستجوب أولاً</li>

        <ul><li>تُقدَّر حسب الظروف</li><li>سفر دولي: أشهر عديدة</li><li>مدن قريبة: أيام كافية</li></ul>
      </div>
    </div>

      <p>الإشعار غير الكافي = <span class="kw">سبب لرفض التنفيذ</span> بموجب م.5(1)(ب) اتفاقية نيويورك — هذا الربط مهم جداً في أسئلة الاختبار.</p>

    <!-- Hearing procedure flowchart -->
    <div class="section-title">الإجراء النموذجي لجلسة الاستماع</div>

    <div class="flowchart">
      <div class="flow-step purple-step" style="width:92%;">① هيئة التحكيم تفتتح الجلسة — ترحيب، تعريف، مسائل إدارية، ورقة توقيع الحضور</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step" style="width:92%;">② الإفادات الافتتاحية — المدعي أولاً ثم المدعى عليه (أحياناً يطلب المحكم مقدمة المدعى عليه فوراً)</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step yellow-step" style="width:92%;">③ المدعي يستدعي شهوده (شهود إثبات + خبراء): شهادة رئيسة → استجواب مقابل → إعادة استجواب → أسئلة الهيئة</div>

    <!-- Absence -->
    <div class="section-title">عدم المثول — ماذا يفعل المحكم؟</div>

    <div class="two-col">
      <div>
        <div class="purple-box">
          <div class="p-title">📜 م.25(ج) القانون النموذجي + م.2-26 ICC</div>
          <p>شرطان للاستمرار في غياب الطرف: <span class="kw">① إشعار صحيح</span> + <span class="kw">② لا مبرر كافٍ</span> للغياب. عندئذ تستمر الإجراءات وتُصدر الهيئة حكماً بناءً على الأدلة المتوافرة.</p>
        </div>
      </div>
      <div>
        <div class="blue-box">
          <div class="b-title">⚡ النهج العملي في غياب طارئ</div>
          <p>المحكم لن يستمر أبداً بمجرد تأخر أحد الأطراف. يُؤجّل نصف يوم → يُعاد تحديد موعد → يُرسل إشعار للجميع + <span class="kw">تحذير</span>: التأخر مرة ثانية = الاستمرار في الغياب + أمر بسداد التكاليف المهدرة.</p>
        </div>
      </div>
    </div>

    <!-- Compelling witness attendance -->
    <div class="section-title">إجبار الشاهد على الحضور</div>
    <div class="def-box">
      <div class="def-title">📌 المادة 27 القانون النموذجي</div>
      <p>هيئة التحكيم في معظم الأنظمة لا تملك صلاحية إجبار الشهود — يجب الحصول على <span class="kw">أمر استدعاء من المحكمة</span>. "يجوز لهيئة التحكيم أو لأي من الطرفين، بموافقة هيئة التحكيم، طلب المساعدة من محكمة مختصة للحصول على أدلة."</p>
    </div>

    <div class="law-box">
      <div class="law-title">📜 م.4(7) قواعد IBA — غياب الشاهد الخبير</div>
      <p>إذا تخلف الخبير المعيّن من أحد الطرفين عن الحضور دون سبب صحيح → <span class="kw">تتجاهل هيئة التحكيم تقريره</span> إلا في ظروف استثنائية.</p>
    </div>

    <div class="side-note memory-tip">
      <div class="note-title">🧠 تذكر — شروط الاستمرار في غياب الطرف</div>
      <p><strong>إ + لا م</strong>: <strong>إ</strong>شعار صحيح + <strong>لا م</strong>بررٍ كافٍ = يجوز الاستمرار. غياب أحد الشرطين = لا يجوز.</p>
    </div>

    <!-- Leading vs Non-leading questions -->
    <div class="section-title">الأسئلة الاستدراجية مقابل غير الاستدراجية</div>

    <div class="def-box">
      <div class="def-title">📌 تعريف السؤال الاستدراجي</div>
      <p>هو السؤال الذي "يأخذ" الشاهد إلى الإجابة أو يُوحي إليها من خلاله — الشاهد يقول فقط "نعم" بدلاً من إعطاء أدلة مباشرة. <span class="kw">ممنوع في الشهادة الرئيسة</span> وفق م.8(2) قواعد IBA.</p>
    </div>

    <div class="two-col">
      <div class="qa-box" style="background:#fdf2f2; border:2px solid #e74c3c; border-radius:9px;">
        <div class="qa-title" style="color:#c0392b;">❌ أسئلة استدراجية (ممنوعة في الشهادة الرئيسة)</div>
        <div class="qa-q">س: "هل كانت الساعة تشير إلى الثالثة مساءً عندما وصلتِ إلى المنزل؟"</div>
        <div class="qa-a">ج: "نعم." ← إجابة غير مفيدة</div>
        <hr style="margin:5px 0; border-color:#f1948a;">
        <div class="qa-q">س: "هل كنتِ مضطرة لقرع الجرس لأنك نسيتِ مفتاحكِ؟"</div>
        <div class="qa-a">ج: "نعم." ← الشاهد لم يُعطِ أدلة مباشرة</div>
      </div>
      <div class="qa-box" style="background:#eafaf1; border:2px solid #27ae60; border-radius:9px;">
        <div class="qa-title" style="color:#1e8449;">✅ أسئلة غير استدراجية (الصحيحة)</div>
        <div class="qa-q">س: "أين ذهبتِ؟"</div>
        <div class="qa-a">ج: "عدتُ إلى المنزل."</div>
        <div class="qa-q">س: "متى وصلتِ؟"</div>
        <div class="qa-a">ج: "الثالثة مساءً."</div>
        <div class="qa-q">س: "كيف تستطيعين التأكد من التوقيت؟"</div>
        <div class="qa-a">ج: "سمعتُ ساعة الكنيسة تشير إلى الثالثة."</div>
        <div class="qa-q">س: "ماذا فعلتِ عندئذٍ؟"</div>
        <div class="qa-a">ج: "قرعتُ الجرس." ← الشاهد يروي بنفسه</div>
      </div>
    </div>

    <!-- Cross examination -->
    <div class="section-title">الاستجواب المقابل (Cross-examination)</div>

    <div class="two-col">
      <div>
        <div class="purple-box">
          <div class="p-title">⚖️ الفرق بين الأنظمة القانونية</div>
          <p><span class="kw">القانون العام</span>: الاستجواب المقابل خاصية أساسية — المحامون يستجوبون شهود الخصم. <span class="kw">القانون المدني</span>: ليس ضرورياً بل قد يُعدّ غير مناسب أصلاً — الشهادة المكتوبة أساس الدليل. في التحكيم الدولي: عادةً يُسمح بشكل منه بناءً على طلب الطرفين.</p>
        </div>
      </div>
      <div>
        <div class="col-box" style="background:#fffde7; border-color:#f9c84a;">
          <h4 style="color:#9a7d0a;">📝 أنماط الاستجواب المقابل</h4>
          <ul>
            <li>"قلتَ هذا الصباح... لماذا لم تذكره في تقريرك؟"</li>
            <li>"هل عملتَ للمدعي ستة أسابيع؟ ثم فصلك؟"</li>
            <li>"هل فحصتَ الكمية كلها؟ كم استغرق ذلك؟"</li>
          </ul>
        </div>
        <div class="col-box" style="margin-top:8px; background:#f3e5f5; border-color:#ce93d8;">
          <h4 style="color:#6a1b9a;">⚠️ نتائج عكسية</h4>
          <ul>
            <li>الاستجواب الطويل ينتج نتائج عكسية</li>
            <li>خاصة عند هيئة تحكيم من دول القانون المدني</li>
            <li>المحكم يتدخل للتحقق من الصلة</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Re-examination example -->
    <div class="section-title">إعادة الاستجواب — مثال تطبيقي</div>

    <div class="two-col">
      <div class="qa-box" style="background:#fdf2f2; border:1.5px solid #e74c3c; border-radius:9px;">
        <div class="qa-title" style="color:#c0392b;">الاستجواب المقابل</div>
        <div class="qa-q">س: "أنت تتأهب للحصول على 200,000 جنيه بموجب هذه الإرادة، أليس كذلك؟"</div>

      <div class="qa-box" style="background:#eafaf1; border:1.5px solid #27ae60; border-radius:9px;">

        <div class="qa-q">س: "كم سترث من المتوفاة في حال عدم وجود الوصية؟"</div>

      </div>

    <div class="side-note common-error">
      <div class="note-title">⚠️ خطأ شائع في الاختبارات</div>
      <p>الأسئلة الاستدراجية <span class="kw">مسموح بها في الاستجواب المقابل</span> لكنها <span class="kw">ممنوعة في الشهادة الرئيسة</span>. الكثير من الطلاب يعتقدون أنها ممنوعة مطلقاً.</p>

          <p>عند الحاجة لتحديد <span class="kw">سبب</span> ما حدث لا فقط ما حدث: سبب تعطل مكابح شاحنة، سبب انهيار مبنى، احتمالات التأخير في مشاريع إنشائية، تقدير قيمة لوحة فنية.</p>

          <span class="kw">② إعطاء رأي في "المسألة النهائية"</span>: المسؤولية القانونية — هذا اختصاص المحكم وحده.</p>

    <!-- Joint conferencing -->
    <div class="section-title">الاستجواب الجماعي للشهود (المواجهة) — Witness Conferencing</div>

    <div class="def-box">
      <div class="def-title">📌 تعريف المواجهة</div>
      <p>"جلسة استماع تجمع جميع شهود الإثبات والشهود الخبراء والخبراء الآخرين المشاركين في التحكيم معاً — جلسة فريق مقابل فريق لا استجواباً لشاهد يلي آخر."</p>
    </div>

    <div class="two-col">
      <div class="col-box" style="background:#eafaf1; border-color:#27ae60;">
        <h4 style="color:#1e8449;">✅ مزايا المواجهة</h4>
        <ul>
          <li>فرصة للاتفاق أو الاعتراض على بيانات الجانب الآخر فوراً</li>
          <li>تأثير مباشر في هيئة التحكيم</li>
          <li>تمنع تعارض الشهادات المستقلة</li>
        </ul>
      </div>
      <div class="col-box" style="background:#fdf2f2; border-color:#e74c3c;">
        <h4 style="color:#c0392b;">❌ مخاطر المواجهة</h4>
        <ul>
          <li>الخبراء قد يشعرون بالخوف</li>
          <li>دون إلمام كامل بالدعوى → فوضى</li>
          <li>لا تناسب المحكم "ضعيف القلب"</li>
        </ul>
      </div>
    </div>

    <!-- Without prejudice meetings -->
    <div class="section-title">اجتماعات عدم الإضرار (Without Prejudice)</div>

    <div class="blue-box">
      <div class="b-title">🎯 الهدف والآلية</div>
      <p>الخبراء ذوو التخصص الواحد يجتمعون لإعداد قائمة بالمسائل التي <span class="kw">لا خلاف عليها</span>. في المناقشات غير الرسمية، يجوز لكل طرف رؤية قوة أدلة الآخر قبل كتابة أي شيء — "حفظ ماء الوجه".</p>
    </div>

    <div class="two-col">
      <div class="col-box" style="background:#fffde7; border-color:#f9c84a;">

    <div><div class="chapter-num">الفصل الرابع عشر</div><h1>التكاليف — المصطلحات والسلطة التقديرية والتوزيع</h1></div>

  <div class="page-content">

    <div class="section-title">المصطلحات الأربعة الرئيسة في التكاليف</div>

    <div class="two-col">
      <div class="def-box">
        <div class="def-title">① تكاليف التحكيم (Arbitration Costs)</div>
        <p>أتعاب هيئة التحكيم + نفقاتها + أتعاب الخبراء الذين تعيّنهم + الرسوم الإدارية للمؤسسة. <span class="kw">قائمة م.40(2) الأونسيترال</span> حصرية بما يُعتبر تكاليف.</p>
      </div>
      <div class="def-box">
        <div class="def-title">② التكاليف القانونية الخاصة بالأطراف</div>
        <p>رسوم المحامين + الخبراء + تكاليف السفر والفندق لإعداد الدعوى وتقديمها. تختلف عن تكاليف التحكيم.</p>
      </div>
    </div>
    <div class="two-col">
      <div class="def-box">
        <div class="def-title">③ تكاليف التحكيم القابلة للاسترداد</div>
        <p>الجزء من التكاليف الذي <span class="kw">يُحكم بدفعه من الطرف الخاسر للرابح</span>. يختلف عن إجمالي ما أُنفق فعلياً — يشمل فقط المعقول منها.</p>
      </div>
      <div class="def-box">
        <div class="def-title">④ تخصيص التكاليف</div>
        <p>القرار بشأن <span class="kw">من يدفع لمن</span> — سلطة تقديرية واسعة للهيئة. يستند إلى نتيجة الإجراءات + سلوك الأطراف.</p>
      </div>
    </div>

    <!-- Sources of costs authority -->
    <div class="section-title">مصادر سلطة الحكم بالتكاليف</div>
    <div class="flowchart">
      <div class="flow-step orange-step" style="width:92%;">① اتفاق الأطراف — الميناء الأول للتوقف</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step" style="width:92%;">② قانون مقر التحكيم (قانون مقر التحكيم)</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step yellow-step" style="width:92%;">③ القواعد التحكيمية المطبقة</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step green-step" style="width:92%;">④ السلطة التقديرية لهيئة التحكيم (واسعة عادةً)</div>
    </div>

    <!-- Types of costs -->
    <div class="section-title">مكونات التكاليف — التفصيل</div>

    <div class="three-col">
      <div class="col-box">
        <h4>👨‍⚖️ أتعاب هيئة التحكيم</h4>
        <ul>
          <li>بالجلسة (5-7 ساعات/يوم)</li>
          <li>بالساعة: قراءة + صياغة + تجاوز الجلسة + حكم التحكيم</li>
          <li>اللغة الأجنبية = وقت أطول</li>
        </ul>
      </div>
      <div class="col-box" style="background:#fff3e0; border-color:#ffcc80;">
        <h4 style="color:#e65100;">✈️ نفقات المحكم</h4>
        <ul>
          <li>HKIAC: درجة رجال الأعمال معقولة</li>
          <li>ICC: رسم يومي + تذكرة رجال الأعمال</li>
          <li>الجناح الفاخر = يدفعه المحكم بنفسه</li>
        </ul>
      </div>
      <div class="col-box">
        <h4>🏛️ رسوم المؤسسة</h4>
        <ul>
          <li>ICC: 3,000 دولار للتعيين دون إدارة</li>
          <li>رسم إداري حسب المبلغ المتنازع عليه</li>
          <li>دفعة مقدمة مؤقتة في البداية</li>
        </ul>
      </div>
    </div>

    <!-- Key provisions -->
    <div class="two-col">
      <div class="law-box">
        <div class="law-title">📜 م.27 قانون التحكيم الدولي 1974 (أستراليا)</div>
        <p>تكاليف التحكيم وفق السلطة التقديرية للهيئة. للهيئة: توجيه من يدفع + فرض ضريبة + تحديد مبلغ محدد. نص اختياري (opt-out).</p>
      </div>
      <div class="law-box">
        <div class="law-title">📜 م.21 قانون التحكيم الدولي سنغافورة 1994</div>
        <p>فرض الضريبة هو الوضع الافتراضي ما لم يتفق الأطراف على خلافه. أمين سجل SIAC يحدد الرسوم. شهادته جزء من حكم التحكيم.</p>
      </div>
    </div>

    <div class="side-note memory-tip">
      <div class="note-title">🧠 تذكر — المصطلحات الأربعة (ت.ق.ا.خ)</div>
      <p><strong>ت</strong>كاليف التحكيم | <strong>ق</strong>انونية للأطراف | <strong>ا</strong>سترداد قابلة | <strong>خ</strong>صيص — يجب التمييز بينها في أسئلة الاختبار</p>
    </div>

    <div class="side-note common-error">
      <div class="note-title">⚠️ خطأ شائع</div>
      <p>القانون النموذجي <span class="kw">لا ينص صراحةً</span> على تكاليف التحكيم — الدول التي تبنته أضافت نصوصاً مستقلة (أستراليا، هونغ كونغ، سنغافورة). الصين وماليزيا لا تتضمنان نصوصاً بالتكاليف.</p>
    </div>

    <div><div class="chapter-num">الفصل الرابع عشر</div><h1>قاعدة "التكاليف تلي الحدث" والتكاليف القابلة للاسترداد</h1></div>
    <div class="page-badge">صفحة ٣ من ٥</div>

  <div class="page-content">

    <div class="section-title">القاعدة العامة — التكاليف تلي الحدث</div>

    <div class="highlight-box">
      <p>🏆 <span class="highlight">"التكاليف تلي الحدث" = الطرف الخاسر يدفع</span> — مبدأ التناسب (م.1057(1) قانون التحكيم الألماني + م.609(1) قانون التحكيم النمساوي). "الحدث" = النتيجة الناجحة.</p>
    </div>

    <!-- Examples of identifying the winner -->
    <div class="section-title">أمثلة على تحديد "الرابح" — أسئلة صعبة</div>

    <table class="ex-table">
      <tr><th>المثال</th><th>الوضع</th><th>من هو الرابح؟</th><th>الحل</th></tr>
      <tr><td>المثال الأول</td><td>المدعى عليه طلب تمديد وقت وحصل عليه</td><td>ربح لكن بسبب إهماله</td><td>يدفع تكاليف "انتصاره"</td></tr>
      <tr><td>المثال الثاني</td><td>"ج" طلب 12,000,000 $ وحصل على 1,200,000 $</td><td>غامض — "ج" أو "ص"؟</td><td>الهيئة تأخذ النسبة بعين الاعتبار</td></tr>
      <tr><td>المثال الثالث</td><td>ربح المدعي 75,000 $ + ربح المدعى عليه 42,000 $ مضادة</td><td>هل حدث واحد أم ثلاثة؟</td><td>الهيئة تقسّم حسب الملابسات</td></tr>
    </table>

    <!-- Exceptions -->
    <div class="section-title">استثناءات القاعدة — التكاليف لا تلي الحدث</div>

    <div class="two-col">
      <div>
        <div class="orange-box">
          <div class="o-title">⚠️ سلوك الأطراف يؤثر</div>
          <p>الهيئة يجوز لها تجريد الرابح من تكاليفه إذا: <span class="kw">قدم أدلة فوضوية</span> أو <span class="kw">لم يلتزم بتعليمات الهيئة</span> أو <span class="kw">ضيّع وقتاً في مسائل خسر فيها</span>. مثال: طرف قدم 800+ جزء أدلة بدون ترتيب = حُرم من تكاليفه رغم فوزه.</p>
        </div>
      </div>
      <div>
        <div class="col-box" style="background:#fffde7; border-color:#f9c84a;">
          <h4 style="color:#9a7d0a;">⚖️ توزيع التكاليف بالتناسب</h4>
          <ul>
            <li>م.1455 القانون التجاري المكسيكي: يجوز تقسيم التكاليف بالنسبة</li>
            <li>م.33(2)(أ)(1) قانون تحكيم موريشيوس: يجوز تجاهل القاعدة</li>
            <li>إذا ربح الطرفان نقاطاً مختلفة → يدفع كل منهما تكاليفه</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Recoverable costs -->
    <div class="section-title">تحديد التكاليف القابلة للاسترداد</div>

    <div class="flowchart">
      <div class="flow-step orange-step" style="width:92%;">① تحديد من يدفع لمن (تخصيص التكاليف)</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step" style="width:92%;">② تحديد بنود الدفع الرئيسة (3 شهود؟ 5 أيام جلسات؟ خبراء؟)</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step yellow-step" style="width:92%;">③ محاولة اتفاق الطرفين على المبالغ أولاً</div>
      <div class="flow-arrow">↓</div>
      <div class="flow-step green-step" style="width:92%;">④ عند الخلاف: الهيئة تحدد "المعقول" فقط (م.74(7)(أ) هونغ كونغ)</div>
    </div>

    <div class="two-col">
      <div class="col-box">
        <h4>📋 بنود الدفع الرئيسة</h4>
        <ul>
          <li>أقوال الشهود (عددهم)</li>
          <li>رسوم ونفقات الخبراء</li>
          <li>تكاليف تجميع المستندات</li>
          <li>تكاليف أيام جلسات الاستماع</li>
          <li>إعداد حكم التحكيم</li>
        </ul>
      </div>
      <div>
        <div class="orange-box">
          <div class="o-title">📌 م.74(7)(أ) هونغ كونغ — معيار "المعقول"</div>
          <p>سؤالان: ① هل كان من المعقول تحمل هذه التكاليف؟ ② إن نعم، ما المبلغ المعقول؟ — قد يكون أقل مما دُفع فعلاً. الخبير الثاني غير الضروري = لا استرداد.</p>
        </div>
      </div>
    </div>

    <!-- Ceiling on recoverable costs -->
    <div class="section-title">الحد الأقصى للتكاليف القابلة للاسترداد (م.57(3) هونغ كونغ)</div>

    <div class="def-box">
      <div class="def-title">📌 الهدف من الحد الأقصى</div>
      <p>منع الطرف الثري من "شراء ميزة" بالإنفاق المبالغ فيه. الهيئة تُخطر الأطراف <span class="kw">قبل تحمل التكاليف</span> بالحد المقرر وضعه في الاعتبار. <span class="kw">يجب أن يسبق التكاليف ذات الصلة</span> وإلا لا أثر له.</p>
    </div>

    <div class="side-note common-error">
      <div class="note-title">⚠️ تحذير — النتائج العكسية</div>
      <p>قد يضر الحد الأقصى <span class="kw">بالطرف الفقير</span> أيضاً! إذا وضع حداً لتكاليفه وربح — فتكاليفه المحدودة لن تُسترد كاملاً، بينما راهن على الإنفاق أكثر مما يملك لمواجهة الخصم الثري.</p>
    </div>

    <div><div class="chapter-num">الفصل الرابع عشر</div><h1>العروض بهدف التسوية والفائدة</h1></div>
    <div class="page-badge">صفحة ٤ من ٥</div>
  </div>
  <div class="page-content">

    <div class="section-title">العروض بهدف التسوية — أهميتها وأنواعها</div>

    <div class="highlight-box">
      <p>🤝 <span class="highlight">تُسوى معظم الدعاوى قبل إعلان حكم التحكيم النهائي</span> — العروض تُحمي الطرف من التكاليف إذا نجح في تحجيم المطالبة. قوانين التحكيم الحديثة تُشجع على مفاوضات التسوية.</p>
    </div>

    <div class="two-col">
      <div>
        <div class="sub-title">① العرض المفتوح (Open Offer)</div>
        <div class="col-box" style="background:#e8f4fd;">
          <h4>محتويات العرض المفتوح</h4>
          <ul>
            <li>المبلغ المالي المعروض</li>
            <li>المبلغ مقروناً بالفائدة</li>
            <li>التكاليف أو طريقة الاتفاق عليها</li>
            <li>الفترة الزمنية للقبول</li>
          </ul>
        </div>
        <div class="orange-box" style="margin-top:8px;">
          <div class="o-title">⚠️ خطر العرض المفتوح</div>
          <p>الهيئة قد "تتلاعب" بحكمها ليصل أعلى أو أقل من العرض عن قصد. لذا يُفضَّل العرض المغلق عادةً.</p>
        </div>
      </div>
      <div>
        <div class="sub-title">② العرض المغلق (Calderbank Offer)</div>
        <div class="col-box" style="background:#eafaf1; border-color:#27ae60;">
          <h4 style="color:#1e8449;">الآلية</h4>

function loadChapter(id) {
  const ch = CHAPTERS.find(c => c.id === id);
  if (!ch) return;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) { navEl.classList.add('active'); navEl.scrollIntoView({block:'nearest'}); }
  document.getElementById('breadcrumb').textContent = 'Module 1';
  document.getElementById('topbarSep').style.display = '';
  document.getElementById('topbarTitle').textContent = 'الفصل ' + ch.num + ' — ' + ch.title;
  const content = CHAPTER_CONTENT[id] || '<p style="padding:40px;text-align:center;color:#999;">محتوى قيد التحضير</p>';
  document.getElementById('contentArea').innerHTML = content;
  document.getElementById('contentArea').scrollTop = 0;
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  const sb = document.getElementById('sidebar');
  if (sidebarCollapsed) {
    sb.classList.add('collapsed');
    ['logoTextWrap','mPillText','mPillBadge'].forEach(id => {
      const el = document.getElementById(id); if(el) el.style.display='none';
    });
    document.querySelectorAll('.ni-content,.nav-section-title').forEach(el => el.style.display='none');
    document.getElementById('collapseBtn').textContent = '►';
    const ct = document.getElementById('sidebar-credit-text'); if(ct) ct.style.display='none';
  } else {
    sb.classList.remove('collapsed');
    ['logoTextWrap','mPillText','mPillBadge'].forEach(id => {
      const el = document.getElementById(id); if(el) el.style.display='';
    });
    document.querySelectorAll('.ni-content,.nav-section-title').forEach(el => el.style.display='');
    document.getElementById('collapseBtn').textContent = '◄ طي القائمة';
    const ct2 = document.getElementById('sidebar-credit-text'); if(ct2) ct2.style.display='';
  }
}

function showReferences() {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-refs').classList.add('active');
  document.getElementById('breadcrumb').textContent = 'المراجع القانونية';
  document.getElementById('topbarSep').style.display = '';
  document.getElementById('topbarTitle').textContent = 'المراجع الرئيسية — اتفاقية نيويورك · القانون النموذجي · قواعد الأونسيترال · النظام السعودي · SCCA';
  activeRef = 'ny';
  renderRefPage();
  document.getElementById('contentArea').scrollTop = 0;
}

function selectRef(key) {
  activeRef = key;
  renderRefPage();
  document.getElementById('contentArea').scrollTop = 0;
}

function renderRefPage() {
  const cards = Object.entries(REFS).map(([key, r]) => `
    <div class="ref-card ${activeRef===key?'active-ref':''}" onclick="selectRef('${key}')">
      <span class="ref-card-badge">${r.badge}</span>
      <div class="ref-card-icon">${r.icon}</div>
      <div class="ref-card-name">${r.short}</div>
      <div class="ref-card-sub">${r.sub}</div>
    </div>`).join('');

  const ref = REFS[activeRef];
  const bodyContent = activeRef === 'ny' ? NY_CONTENT
    : activeRef === 'ml' ? ML_CONTENT
    : activeRef === 'um' ? UM_CONTENT
    : activeRef === 'sa_law' ? SA_LAW_CONTENT
    : activeRef === 'scca' ? SCCA_CONTENT
    : activeRef === 'iba' ? IBA_CONTENT
    : activeRef === 'siac' ? SIAC_CONTENT
    : activeRef === 'icc' ? ICC_CONTENT
    : activeRef === 'aiac' ? AIAC_CONTENT
    : activeRef === 'scca_proc' ? SCCA_PROC_CONTENT
    : '';

  document.getElementById('contentArea').innerHTML = `
    <div class="ref-hero">
      <h2>📚 المراجع القانونية الرئيسية</h2>
      <p>المصادر الأولية للتحكيم التجاري الدولي — اتفاقيات، قوانين نموذجية، قواعد إجرائية</p>
      <div class="ref-stats-row">
        <div class="ref-stat">📌 10 مراجع رئيسية</div>
        <div class="ref-stat">⚖️ نطاق دولي وإجرائي</div>
        <div class="ref-stat">🔗 مرتبطة بفصول CIArb</div>
      </div>
    </div>
    <div class="ref-cards-row">${cards}</div>
    <div class="ref-content-area">
      <div class="ref-content-header">
        <div>
          <h3>${ref.icon} ${ref.name}</h3>
          <div style="font-size:12px;opacity:.85;margin-top:3px">${ref.sub} — ${ref.scope}</div>
        </div>
        <div style="text-align:left;font-size:12px;opacity:.8">${ref.articles} مادة/قاعدة</div>
      </div>
      ${bodyContent}
    </div>`;
}

          <ul>
            <li><strong>① القانون المنظِّم للعقد (Governing Law):</strong> القانون الموضوعي الذي يحكم حقوق والتزامات الأطراف. يُختار صراحةً أو ضمناً.</li>
            <li><strong>② قانون اتفاق التحكيم:</strong> قد يختلف عن القانون المنظّم للعقد الأصلي — يحكم صحة وتفسير شرط التحكيم ذاته.</li>
            <li><strong>③ قانون مقرّ التحكيم (Lex Arbitri):</strong> القانون الإجرائي للدولة التي يُعقد فيها التحكيم — يحكم الإجراءات ويمنح صلاحية الإلغاء.</li>

            <li><strong>قانون مقرّ التحكيم (Lex Arbitri / Curial Law):</strong> يحكم <em>الإجراءات</em> — صحة اتفاق التحكيم، تشكيل الهيئة، دعم المحاكم، وإمكانية إلغاء القرار. هو قانون الدولة التي يُعقد فيها التحكيم.</li>

    <div class="event">مرّت مرحلة الوساطة وانتهت دون تسوية. تشكّلت هيئة التحكيم: أنطوان شيراك (معيَّن من TF)، سكوت مولدون (معيَّن من DWC)، السيدة فيسبوتشي (رئيسة — إيطالية). مقرّ التحكيم: سيدني.</div>

    <strong>وقائع الجلسة الثانية:</strong>
    <div class="event">⚡ <strong>الحدث 1:</strong> في اليوم التالي للاجتماع التمهيدي، أبلغت TF الهيئةَ أن DWC أزالت التوربينات من المحطة ونقلتها إلى مخزن طرف ثالث (مجمّع ساحلي شرق الهند). لا تعلم TF مكانها الدقيق ولا حالتها.</div>
    <div class="event">⚡ <strong>الحدث 2:</strong> تسعى TF للحصول على: (أ) أمر بالكشف عن مكان التوربينات وصونها، (ب) أمر تجميدي يمنع DWC من تبديد أصولها في ماليزيا، (ج) ضمان التكاليف من DWC.</div>

    <div class="event">⚖️ <strong>الحدث 4:</strong> انتهت الجلسة. الهيئة أصدرت قرار تحكيم بمنح TF 4 مليون يورو — لكن القرار يحتوي خطأ مطبعياً (كُتب 14 مليون دولار عوضاً عن 4 مليون يورو). DWC تستغلّ الخطأ انتهازياً.</div>

        <div class="ws-ans-label">✅ الإجابة النموذجية — CIArb</div>

            <li><strong>حفظ الأصول:</strong> منع تبديد أو إخفاء الأصول التي قد تُنفَّذ عليها القرارات مستقبلاً.</li>
            <li><strong>صون الأدلة:</strong> الحفاظ على المستندات والمعدات والأدلة الجوهرية من الضياع أو التلف.</li>
            <li><strong>الحفاظ على المركز القانوني:</strong> منع الضرر الوشيك الذي لا يمكن جبره بالتعويض لاحقاً.</li>
            <li><strong>ضمان فاعلية التحكيم:</strong> تفادي التحكيم يصبح عديم الأثر لو نُفّذت إجراءات الضرر قبل صدور القرار النهائي.</li>
          </ul>
          <div class="ws-tip">💡 في قضية TF: الغرض مزدوج — (أ) معرفة مكان وحال التوربينات، (ب) منع DWC من تبديد أصولها في ماليزيا قبل صدور قرار التحكيم.</div>

            <li><strong>الخطوة الثانية:</strong> تسجيل الغياب رسمياً في محضر الجلسة.</li>
            <li><strong>الخطوة الثالثة:</strong> إذا لم يحضر خلال وقت معقول → للهيئة تأجيل الجلسة لمدة قصيرة مع إشعار المدعي بالعواقب.</li>
            <li><strong>الأساس القانوني:</strong> م.25أ قواعد الأونسيترال — تخوّل الهيئة إنهاء الإجراءات إذا تخلّف المدعي عن تقديم ادعاءاته.</li>

        <span class="ws-q-text">هل يجب أن يأخذ قرار التحكيم شكلاً معيناً ليكون صحيحاً وقابلاً للتنفيذ؟</span>

          <ul>
            <li><strong>الكتابة:</strong> يصدر القرار كتابياً — شرط أساسي.</li>
            <li><strong>التوقيع:</strong> يوقّعه المحكمون — في هيئة متعددة يكفي توقيع الأغلبية مع بيان سبب الغياب.</li>
            <li><strong>الأسباب:</strong> يُبيّن الأسباب التي يستند إليها — ما لم يتفق الطرفان على خلاف ذلك أو كان قراراً بشروط متفق عليها.</li>
            <li><strong>التاريخ والمكان:</strong> يُحدد تاريخه ومكان التحكيم — ويُعدّ صادراً في ذلك المكان.</li>
            <li><strong>التسليم:</strong> تُسلَّم نسخة موقّعة لكل طرف.</li>

            <li><strong>المعدل:</strong> قد يُحدده العقد، أو القانون المنظّم، أو سعر السوق إذا لم يكن هناك نص.</li>

            <li><strong>المبدأ:</strong> عملة القرار تُحدد وفق القانون الواجب التطبيق على موضوع النزاع وشروط العقد.</li>

        <div class="ws-ans-body">
          <strong>نعم — الظروف تُبرر طلب الردّ:</strong>
          <ul>
            <li><strong>الأساس القانوني:</strong> م.12 القانون النموذجي — المحكم يُردّ إذا وُجدت ظروف تثير "شكوكاً مبررة" حول حياده أو استقلاليته. عرض منصب تنفيذي من شركة تسعى لاستحواذ على الشركة الأم للمدعى عليه = تضارب مصالح واضح.</li>
            <li><strong>الخطوات (م.13 القانون النموذجي + قواعد الأونسيترال م.12):</strong>
              <br>① إبلاغ المحكم والطرف الآخر كتابياً بسبب الردّ خلال 15 يوماً من العلم بالسبب.

/* ─── SEARCH INDEX ─── */
const SEARCH_INDEX = [];
function buildSearchIndex() {
  // Deep index chapters - extract each article/section separately
  CHAPTERS.forEach(ch => {
    const el = document.createElement('div');
    el.innerHTML = CHAPTER_CONTENT[ch.id] || '';
    const fullText = el.textContent.replace(/\s+/g,' ').trim();
    // Store full text for searching, show title in results
    SEARCH_INDEX.push({
      type:'chapter', id:ch.id,
      title: ch.icon+' الفصل '+ch.num+': '+ch.title,
      fulltext: fullText,
      preview: fullText.substring(0,200),
      action:()=>{loadChapter(ch.id);closeSearch();}
    });
  });
  // Deep index refs - each accordion group separately
  const refSets = [
    ['📜 اتفاقية نيويورك', NY_CONTENT, 'ny'],
    ['⚖️ القانون النموذجي', ML_CONTENT, 'ml'],
    ['📋 قواعد الأونسيترال', UM_CONTENT, 'um'],
    ['🇸🇦 النظام السعودي', SA_LAW_CONTENT, 'sa_law'],
    ['🏛️ قواعد SCCA', SCCA_CONTENT, 'scca'],
    ['⚖️ أدوات IBA', IBA_CONTENT, 'iba'],
    ['🦁 SIAC 2025', SIAC_CONTENT, 'siac'],
    ['🏛️ ICC 2021', ICC_CONTENT, 'icc'],
    ['🌿 AIAC 2021', AIAC_CONTENT, 'aiac'],
    ['📋 إجراءات SCCA', SCCA_PROC_CONTENT, 'scca_proc']
  ];
  refSets.forEach(([title,html,key])=>{
    const el=document.createElement('div'); el.innerHTML=html;
    const fullText = el.textContent.replace(/\s+/g,' ').trim();
    SEARCH_INDEX.push({
      type:'ref', id:key, title,
      fulltext: fullText,
      preview: fullText.substring(0,200),
      action:()=>{showReferences();setTimeout(()=>{const b=document.querySelector('[data-ref="'+key+'"]');if(b)b.click();},300);closeSearch();}
    });
  });
  // Deep index workshop sessions
  const wsSets = [
    ['🧪 Workshop الجلسة 1 — مقدمة التحكيم', WS_SESSION1, 1],
    ['🧪 Workshop الجلسة 2 — الانتصاف المؤقت والجلسات', WS_SESSION2, 2],
    ['🧪 Workshop الجلسة 3 — المراجعة الشاملة', WS_SESSION3, 3]
  ];
  wsSets.forEach(([title,html,n])=>{
    const el=document.createElement('div'); el.innerHTML=html;
    const fullText = el.textContent.replace(/\s+/g,' ').trim();
    SEARCH_INDEX.push({
      type:'workshop', id:'ws'+n, title,
      fulltext: fullText,
      preview: fullText.substring(0,200),
      action:()=>{showWorkshop(n);closeSearch();}
    });
  });
  // Exam papers
  EXAM_PAPER_DATA.forEach((paper,i)=>{
    const allText = paper.questions.map(q=>
      q.text + ' ' + q.parts.map(p=>p.q+' '+p.ans.replace(/<[^>]+>/g,' ')).join(' ')
    ).join(' ').replace(/\s+/g,' ').trim();
    SEARCH_INDEX.push({
      type:'exam', id:'exam'+i,
      title:'📝 امتحان '+paper.year+' — '+paper.part,
      fulltext: allText,
      preview: allText.substring(0,200),
      action:()=>{showExam();closeSearch();}
    });
  });
}
function openSearch(){
  document.getElementById('searchOverlay').style.display='block';
  setTimeout(()=>document.getElementById('searchInput').focus(),100);
}
function closeSearch(){
  document.getElementById('searchOverlay').style.display='none';
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='';
}
function doSearch(q){
  const res=document.getElementById('searchResults');
  q=q.trim();
  if(q.length<2){
    res.innerHTML='<div style="padding:20px;text-align:center;color:#999;font-size:13px">اكتب كلمة أو أكثر للبحث</div>';
    return;
  }
  const terms=q.toLowerCase().split(/\s+/).filter(t=>t.length>1);
  const hits=SEARCH_INDEX.filter(item=>{
    const hay=(item.title+' '+(item.fulltext||item.preview)).toLowerCase();
    return terms.every(t=>hay.includes(t));
  }).map(item=>{
    // Find the most relevant snippet containing the search term
    const hay=(item.fulltext||item.preview);
    const firstTerm=terms[0].toLowerCase();
    const idx=hay.toLowerCase().indexOf(firstTerm);
    let snippet='';
    if(idx>=0){
      const start=Math.max(0,idx-60);
      const end=Math.min(hay.length,idx+180);
      snippet=(start>0?'...':'')+hay.substring(start,end)+(end<hay.length?'...':'');
      // Highlight terms
      terms.forEach(t=>{
        const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
        snippet=snippet.replace(re,'<mark style="background:#fff176;padding:0 2px;border-radius:2px">$1</mark>');
      });
    } else {
      snippet=hay.substring(0,160)+'...';
    }
    return {...item, snippet};
  });
  if(!hits.length){
    res.innerHTML='<div style="padding:20px;text-align:center;color:#999;font-size:13px">لا نتائج — جرّب كلمات مختلفة</div>';
    return;
  }
  const typeColors={chapter:'#1565c0',workshop:'#1b5e20',ref:'#6a1b9a',exam:'#b71c1c'};
  const typeLabels={chapter:'فصل دراسي',workshop:'Workshop',ref:'مرجع قانوني',exam:'امتحان'};
  res.innerHTML='<div style="padding:6px 18px 2px;font-size:11px;color:#999">'+hits.length+' نتيجة</div>'+
    hits.slice(0,12).map(h=>`
    <div onclick="SEARCH_INDEX.filter(x=>x.id==='${h.id}')[0]?.action()" style="padding:10px 18px;border-bottom:1px solid #f0ede6;cursor:pointer;transition:background .15s" onmouseover="this.style.background='#f9f6f0'" onmouseout="this.style.background=''">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="background:${typeColors[h.type]};color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;flex-shrink:0">${typeLabels[h.type]}</span>
        <span style="font-size:13px;font-weight:700;color:#1a1a1a">${h.title}</span>
      </div>
      <div style="font-size:11.5px;color:#555;line-height:1.7">${h.snippet}</div>
    </div>`).join('');
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}});

function renderExamPaper(papers) {
  const arr = Array.isArray(papers) ? papers : [papers];
  return arr.map(paper => {
    const qCards = paper.questions.map(q => {
      const parts = q.parts.map(p => `
        <div class="ex-q">
          <div class="ex-q-hdr">
            <span class="ex-q-badge">${p.label || ('س'+q.num)}</span>
            <span class="ex-q-text">${p.q}</span>
            ${p.marks ? `<span class="ex-q-marks">(${p.marks} علامة)</span>` : ''}
            <span class="ex-q-arr">▼</span>
          </div>
          <div class="ex-answer">
            <div class="ws-ans-label">✅ نموذج الإجابة — CIArb المستوى الأول</div>
            <div class="ws-ans-body">${p.ans}</div>
          </div>
        </div>`).join('');
      return `
        <div class="ex-section open">
          <div class="ex-section-hdr">
            <span class="ex-sec-num">س${q.num}</span>
            <span class="ex-sec-title">${q.text.substring(0,90)}...</span>
            <span style="margin-right:auto;color:#e53935;font-size:11px;font-weight:700">(${q.marks} علامة)</span>
            <span class="ex-arr">▼</span>
          </div>
          <div class="ex-sec-body">${parts}</div>
        </div>`;
    }).join('');
    return `
      <div class="ex-paper">
        <div class="ex-paper-hdr">
          <div style="font-size:15px;font-weight:700;color:#fff">${paper.year} — ${paper.part}</div>
          <div style="font-size:11px;opacity:.85;margin-top:3px">مجموع الدرجات: ${paper.marks} | ${paper.inst}</div>
        </div>
        ${qCards}
      </div>`;
  }).join('');
}

function buildExamContent() {
  return EXAM_RULES + renderExamPaper(EXAM_PAPER_DATA);
}

function showExam() { showWorkshop(4); }

  const shdr=e.target.closest('.ex-section-hdr');
  if(shdr)shdr.parentElement.classList.toggle('open');
});
